<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200" role="img" aria-labelledby="title desc">
  <title id="title">Workflow</title>
  <desc id="desc">Four-step workflow: input theme, select mode, choose template + art style, confirm mood + title</desc>

  <defs>
    <pattern id="dots-wf" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="3.5" fill="#000" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="1200" height="200" fill="#87CEEB"/>
  <rect width="1200" height="200" fill="url(#dots-wf)"/>

  <rect x="5" y="5" width="1190" height="190" rx="0" fill="none" stroke="#000" stroke-width="8"/>
  <rect x="9" y="9" width="1182" height="182" rx="0" fill="none" stroke="#fff" stroke-width="3"/>
  <rect x="12" y="12" width="1176" height="176" rx="0" fill="#fff"/>

  <!-- Step 1 -->
  <g transform="translate(45, 38)">
    <circle cx="34" cy="34" r="34" fill="#FFD700" stroke="#000" stroke-width="2.5"/>
    <text x="34" y="30" font-family="Georgia, serif" font-size="24" font-style="italic" font-weight="900" fill="#000" text-anchor="middle">01</text>
    <text x="34" y="46" font-family="-apple-system, sans-serif" font-size="11" fill="#000" text-anchor="middle" font-weight="700">STEP</text>
    <text x="86" y="24" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="17" fill="#000" font-weight="700">输入主题</text>
    <text x="86" y="46" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="14" fill="#333" font-weight="500">露营 / 聚会 / 睡前</text>
    <text x="86" y="64" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#666">或直接说"随机"</text>
  </g>
  <!-- Step bottom: 38+64=102, content bottom: 176. Gap: 74px -->

  <g transform="translate(280, 72)" opacity="0.4">
    <line x1="0" y1="0" x2="36" y2="0" stroke="#000" stroke-width="2.5"/>
    <polygon points="36,-6 48,0 36,6" fill="#000"/>
  </g>

  <!-- Step 2 -->
  <g transform="translate(340, 38)">
    <circle cx="34" cy="34" r="34" fill="#FFD700" stroke="#000" stroke-width="2.5"/>
    <text x="34" y="30" font-family="Georgia, serif" font-size="24" font-style="italic" font-weight="900" fill="#000" text-anchor="middle">02</text>
    <text x="34" y="46" font-family="-apple-system, sans-serif" font-size="11" fill="#000" text-anchor="middle" font-weight="700">STEP</text>
    <text x="86" y="24" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="17" fill="#000" font-weight="700">选择模式</text>
    <text x="86" y="46" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="14" fill="#333" font-weight="500">模板 / 自由 / 复刻</text>
    <text x="86" y="64" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#666">三种生成模式可选</text>
  </g>

  <g transform="translate(575, 72)" opacity="0.4">
    <line x1="0" y1="0" x2="36" y2="0" stroke="#000" stroke-width="2.5"/>
    <polygon points="36,-6 48,0 36,6" fill="#000"/>
  </g>

  <!-- Step 3 -->
  <g transform="translate(635, 38)">
    <circle cx="34" cy="34" r="34" fill="#FFD700" stroke="#000" stroke-width="2.5"/>
    <text x="34" y="30" font-family="Georgia, serif" font-size="24" font-style="italic" font-weight="900" fill="#000" text-anchor="middle">03</text>
    <text x="34" y="46" font-family="-apple-system, sans-serif" font-size="11" fill="#000" text-anchor="middle" font-weight="700">STEP</text>
    <text x="86" y="24" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="17" fill="#000" font-weight="700">模板 + 画风</text>
    <text x="86" y="46" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="14" fill="#333" font-weight="500">6+2 模板 + 12 画风</text>
    <text x="86" y="64" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#666">AI 智能推荐最佳组合</text>
  </g>

  <g transform="translate(870, 72)" opacity="0.4">
    <line x1="0" y1="0" x2="36" y2="0" stroke="#000" stroke-width="2.5"/>
    <polygon points="36,-6 48,0 36,6" fill="#000"/>
  </g>

  <!-- Step 4 -->
  <g transform="translate(930, 38)">
    <circle cx="34" cy="34" r="34" fill="#FF0000" stroke="#000" stroke-width="2.5"/>
    <text x="34" y="30" font-family="Georgia, serif" font-size="24" font-style="italic" font-weight="900" fill="#fff" text-anchor="middle">04</text>
    <text x="34" y="46" font-family="-apple-system, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">STEP</text>
    <text x="86" y="24" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="17" fill="#000" font-weight="700">一键输出</text>
    <text x="86" y="46" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="14" fill="#333" font-weight="500">封面提示词 + 文案</text>
    <text x="86" y="64" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#666">标题 / 正文 / 话题标签</text>
  </g>
  <!-- Right edge: 930+86+~135=1151, within 1176. Gap=25px -->

  <!-- Bottom separator -->
  <line x1="45" y1="148" x2="1155" y2="148" stroke="#000" stroke-width="2" stroke-dasharray="8 4"/>
  <circle cx="45" cy="148" r="4" fill="#FF0000"/>
  <circle cx="1155" cy="148" r="4" fill="#FF0000"/>
</svg>