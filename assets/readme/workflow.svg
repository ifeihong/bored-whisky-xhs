<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" role="img" aria-labelledby="title desc">
  <title id="title">Workflow</title>
  <desc id="desc">Four-step workflow: input theme, select mode, choose template + art style, confirm mood + title</desc>

  <defs>
    <pattern id="dots-wf" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="3.5" fill="#000" opacity="0.1"/>
    </pattern>
    <!-- Comic drop shadow -->
    <filter id="shadow-wf" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="0" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Background: light blue with dots -->
  <rect width="1200" height="240" fill="#87CEEB"/>
  <rect width="1200" height="240" fill="url(#dots-wf)"/>

  <!-- Comic panel frames -->
  <rect x="5" y="5" width="1190" height="230" rx="0" fill="none" stroke="#000" stroke-width="8"/>
  <rect x="9" y="9" width="1182" height="222" rx="0" fill="none" stroke="#fff" stroke-width="3"/>
  <rect x="12" y="12" width="1176" height="216" rx="0" fill="#fff"/>

  <!-- Step 1: 输入主题 -->
  <g transform="translate(60, 42)">
    <!-- Number circle -->
    <circle cx="36" cy="36" r="36" fill="#FFD700" stroke="#000" stroke-width="2.5"/>
    <text x="36" y="32" font-family="Georgia, serif" font-size="22" font-style="italic" font-weight="900" fill="#000" text-anchor="middle">01</text>
    <text x="36" y="52" font-family="-apple-system, sans-serif" font-size="10" fill="#000" text-anchor="middle" font-weight="700">STEP</text>
    <!-- Content -->
    <text x="92" y="28" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="16" fill="#000" font-weight="700">输入主题</text>
    <text x="92" y="52" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#333">露营 / 聚会 / 睡前</text>
    <text x="92" y="74" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#666">或直接说"随机"</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(290, 78)" opacity="0.4">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#000" stroke-width="2.5"/>
    <polygon points="40,-6 52,0 40,6" fill="#000"/>
  </g>

  <!-- Step 2: 选择模式 -->
  <g transform="translate(355, 42)">
    <circle cx="36" cy="36" r="36" fill="#FFD700" stroke="#000" stroke-width="2.5"/>
    <text x="36" y="32" font-family="Georgia, serif" font-size="22" font-style="italic" font-weight="900" fill="#000" text-anchor="middle">02</text>
    <text x="36" y="52" font-family="-apple-system, sans-serif" font-size="10" fill="#000" text-anchor="middle" font-weight="700">STEP</text>
    <text x="92" y="28" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="16" fill="#000" font-weight="700">选择模式</text>
    <text x="92" y="52" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#333">模板 / 自由 / 复刻</text>
    <text x="92" y="74" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#666">三种生成模式可选</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(585, 78)" opacity="0.4">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#000" stroke-width="2.5"/>
    <polygon points="40,-6 52,0 40,6" fill="#000"/>
  </g>

  <!-- Step 3: 模板 + 画风 -->
  <g transform="translate(650, 42)">
    <circle cx="36" cy="36" r="36" fill="#FFD700" stroke="#000" stroke-width="2.5"/>
    <text x="36" y="32" font-family="Georgia, serif" font-size="22" font-style="italic" font-weight="900" fill="#000" text-anchor="middle">03</text>
    <text x="36" y="52" font-family="-apple-system, sans-serif" font-size="10" fill="#000" text-anchor="middle" font-weight="700">STEP</text>
    <text x="92" y="28" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="16" fill="#000" font-weight="700">模板 + 画风</text>
    <text x="92" y="52" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#333">6+2 模板 + 12 画风</text>
    <text x="92" y="74" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#666">AI 智能推荐最佳组合</text>
  </g>

  <!-- Arrow 3 -->
  <g transform="translate(880, 78)" opacity="0.4">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#000" stroke-width="2.5"/>
    <polygon points="40,-6 52,0 40,6" fill="#000"/>
  </g>

  <!-- Step 4: 一键输出 -->
  <g transform="translate(945, 42)">
    <circle cx="36" cy="36" r="36" fill="#FF0000" stroke="#000" stroke-width="2.5"/>
    <text x="36" y="32" font-family="Georgia, serif" font-size="22" font-style="italic" font-weight="900" fill="#fff" text-anchor="middle">04</text>
    <text x="36" y="52" font-family="-apple-system, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">STEP</text>
    <text x="92" y="28" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="16" fill="#000" font-weight="700">一键输出</text>
    <text x="92" y="52" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#333">封面提示词 + 文案</text>
    <text x="92" y="74" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#666">标题 / 正文 / 话题标签</text>
  </g>

  <!-- Bottom comic-style separator -->
  <line x1="60" y1="195" x2="1140" y2="195" stroke="#000" stroke-width="2" stroke-dasharray="8 4"/>
  <circle cx="60" cy="195" r="4" fill="#FF0000"/>
  <circle cx="1140" cy="195" r="4" fill="#FF0000"/>
</svg>