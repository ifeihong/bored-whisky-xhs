    <path id="star-s" d="M0,-14 L2.5,-4.5 L12,-4.5 L4.5,1.5 L7,11 L0,5.5 L-7,11 L-4.5,1.5 L-12,-4.5 L-2.5,-4.5 Z" fill="#FF0000"/>
    <path id="star-l" d="M0,-20 L3.5,-6.5 L17,-6.5 L6.5,2.5 L10,15 L0,8 L-10,15 L-6.5,2.5 L-17,-6.5 L-3.5,-6.5 Z" fill="#FF0000"/>
  </defs>

  <!-- Outer background -->
