    <path d="M55 60 L55 20 Q55 5 70 5 L110 5 Q125 5 125 20 L125 60 Q165 85 165 170 L165 420 Q165 435 150 435 L30 435 Q15 435 15 420 L15 170 Q15 85 55 60 Z" fill="#1a1a1a" stroke="#FFD700" stroke-width="2" stroke-opacity="0.5"/>
    <path d="M22 220 Q22 200 34 200 L146 200 Q158 200 158 220 L158 420 Q158 430 146 430 L34 430 Q22 430 22 420 Z" fill="#FFD700" fill-opacity="0.15" stroke="#FFD700" stroke-width="0.8" stroke-opacity="0.3"/>
    <rect x="58" y="245" width="64" height="70" rx="4" fill="#0c0c0a" stroke="#FFD700" stroke-width="1.2" stroke-opacity="0.5"/>
