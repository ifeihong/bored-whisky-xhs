      <text x="143" y="84" font-family="-apple-system, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="700">40°</text>
      <path d="M55 158 L55 130 Q55 120 63 120 L87 120 Q95 120 95 130 L95 158 Q112 166 112 186 L112 206 Q112 210 106 210 L44 210 Q38 210 38 206 L38 186 Q38 166 55 158 Z" fill="#1a1a1a" stroke="#FFD700" stroke-width="1.5"/>
      <rect x="58" y="164" width="30" height="36" rx="3" fill="#fff" stroke="#FFD700" stroke-width="0.8"/>
      <text x="73" y="183" font-family="Georgia, serif" font-size="9" font-style="italic" font-weight="700" fill="#FFD700" text-anchor="middle">BORED</text>
      <text x="73" y="194" font-family="-apple-system, sans-serif" font-size="8" fill="#000" text-anchor="middle">WHISKY</text>
