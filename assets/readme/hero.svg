<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="840" viewBox="0 0 1200 840" role="img" aria-labelledby="title desc">
  <title id="title">BORED WHISKY Xiaohongshu Content Generator</title>
  <desc id="desc">6+2 template system + 12 art styles + 6 color schemes generating Xiaohongshu cover prompts and full copy for BORED WHISKY</desc>

  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
