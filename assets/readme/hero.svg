    <!-- BORED WHISKY title (font-size 72 to save vertical space) -->
    <g filter="url(#comic-shadow)">
      <text x="20" y="115" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-style="italic" font-weight="900" fill="#FFD700" stroke="#000" stroke-width="3" paint-order="stroke" letter-spacing="2">BORED</text>
      <text x="20" y="188" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-style="italic" font-weight="900" fill="#FFD700" stroke="#000" stroke-width="3" paint-order="stroke" letter-spacing="2">WHISKY</text>
