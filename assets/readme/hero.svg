<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="840" viewBox="0 0 1200 840" role="img" aria-labelledby="title desc">
  <title id="title">BORED WHISKY Xiaohongshu Content Generator</title>
  <desc id="desc">6+2 template system + 12 art styles + 6 color schemes generating Xiaohongshu cover prompts and full copy for BORED WHISKY</desc>

  <defs>
    <!-- Halftone dot pattern -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="3.5" fill="#000" opacity="0.1"/>
    </pattern>
    <!-- Comic drop shadow -->
    <filter id="comic-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#000" flood-opacity="0.85"/>
    </filter>
    <filter id="comic-shadow-sm" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="2" stdDeviation="0" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    <!-- Starburst shapes -->
    <path id="star-s" d="M0,-14 L2.5,-4.5 L12,-4.5 L4.5,1.5 L7,11 L0,5.5 L-7,11 L-4.5,1.5 L-12,-4.5 L-2.5,-4.5 Z" fill="#FF0000"/>
    <path id="star-l" d="M0,-20 L3.5,-6.5 L17,-6.5 L6.5,2.5 L10,15 L0,8 L-10,15 L-6.5,2.5 L-17,-6.5 L-3.5,-6.5 Z" fill="#FF0000"/>
  </defs>

  <!-- Outer background: light blue with halftone dots -->
  <rect width="1200" height="840" fill="#87CEEB"/>
  <rect width="1200" height="840" fill="url(#dots)"/>

  <!-- Comic panel frames -->
  <!-- Outer thick black border -->
  <rect x="10" y="10" width="1180" height="820" rx="0" fill="none" stroke="#000" stroke-width="10"/>
  <!-- Inner white border -->
  <rect x="15" y="15" width="1170" height="810" rx="0" fill="none" stroke="#fff" stroke-width="5"/>
  <!-- Content area background -->
  <rect x="20" y="20" width="1160" height="800" rx="0" fill="#fff"/>

  <!-- ============ LEFT CONTENT (x=60..640) ============ -->
  <g transform="translate(60, 55)">

    <!-- Red vertical accent bar -->
    <rect x="0" y="0" width="5" height="155" fill="#FF0000"/>

    <!-- TRAVERSE SKILL badge -->
    <rect x="20" y="0" width="195" height="32" rx="16" fill="#FF0000"/>
    <text x="117" y="21" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="700" letter-spacing="2">TRAVERSE SKILL</text>

    <!-- BORED WHISKY title: comic style -->
    <g filter="url(#comic-shadow)">
      <text x="20" y="110" font-family="Georgia, 'Times New Roman', serif" font-size="70" font-style="italic" font-weight="900" fill="#FFD700" stroke="#000" stroke-width="3.5" paint-order="stroke" letter-spacing="2">BORED</text>
      <text x="20" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="70" font-style="italic" font-weight="900" fill="#FFD700" stroke="#000" stroke-width="3.5" paint-order="stroke" letter-spacing="2">WHISKY</text>
    </g>

    <!-- Chinese subtitle inverted bar -->
    <rect x="20" y="196" width="320" height="42" rx="4" fill="#000"/>
    <text x="180" y="224" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="22" fill="#fff" text-anchor="middle" font-weight="700" letter-spacing="3">小红书图文助手</text>

    <!-- Description -->
    <text x="20" y="278" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="15" fill="#333" font-weight="500">年轻人的口袋威士忌 · 专为 BORED WHISKY 打造的小红书爆款内容生成器</text>
    <text x="20" y="306" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#666">适配 GPT Image2 / Seedream5.0 / Nano Banana Pro 等主流 AI 生图模型</text>

    <!-- Section: 6+2 Templates -->
    <line x1="20" y1="340" x2="560" y2="340" stroke="#000" stroke-width="2" stroke-dasharray="8 4"/>
    <rect x="20" y="332" width="100" height="18" fill="#FF0000"/>
    <text x="70" y="345" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="700" letter-spacing="1">6+2 TEMPLATES</text>

    <g transform="translate(20, 368)">
      <!-- T1-T6 in yellow comic pills -->
      <rect x="0" y="0" width="72" height="28" rx="14" fill="#FFD700" stroke="#000" stroke-width="1.5"/>
      <text x="36" y="19" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#000" text-anchor="middle" font-weight="700">T1 特写</text>
      <rect x="78" y="0" width="72" height="28" rx="14" fill="#FFD700" stroke="#000" stroke-width="1.5"/>
      <text x="114" y="19" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#000" text-anchor="middle" font-weight="700">T2 氛围</text>
      <rect x="156" y="0" width="72" height="28" rx="14" fill="#FFD700" stroke="#000" stroke-width="1.5"/>
      <text x="192" y="19" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#000" text-anchor="middle" font-weight="700">T3 测评</text>
      <rect x="234" y="0" width="72" height="28" rx="14" fill="#FFD700" stroke="#000" stroke-width="1.5"/>
      <text x="270" y="19" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#000" text-anchor="middle" font-weight="700">T4 搭配</text>
      <rect x="312" y="0" width="72" height="28" rx="14" fill="#FFD700" stroke="#000" stroke-width="1.5"/>
      <text x="348" y="19" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#000" text-anchor="middle" font-weight="700">T5 人物</text>
      <rect x="390" y="0" width="72" height="28" rx="14" fill="#FFD700" stroke="#000" stroke-width="1.5"/>
      <text x="426" y="19" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#000" text-anchor="middle" font-weight="700">T6 拼贴</text>
    </g>

    <g transform="translate(20, 406)">
      <rect x="0" y="0" width="72" height="28" rx="14" fill="#FF0000" stroke="#000" stroke-width="1.5"/>
      <text x="36" y="19" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">F1 自由</text>
      <rect x="78" y="0" width="72" height="28" rx="14" fill="#FF0000" stroke="#000" stroke-width="1.5"/>
      <text x="114" y="19" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">F2 复刻</text>
    </g>

    <!-- Section: Core Features -->
    <line x1="20" y1="460" x2="560" y2="460" stroke="#000" stroke-width="2" stroke-dasharray="8 4"/>
    <rect x="20" y="452" width="110" height="18" fill="#000"/>
    <text x="75" y="465" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="700" letter-spacing="1">CORE FEATURES</text>

    <g transform="translate(20, 488)">
      <circle cx="6" cy="6" r="4" fill="#FF0000"/>
      <text x="18" y="11" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#333" font-weight="500">12 种艺术画风（日系 / 韩系 / Y2K / 胶片 / 3D / 水彩 / 蒸汽波 等）</text>
      <circle cx="6" cy="34" r="4" fill="#FF0000"/>
      <text x="18" y="39" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#333" font-weight="500">6 种色彩方案 · 8 种构图角度 · 30+ 装饰组件</text>
      <circle cx="6" cy="62" r="4" fill="#FF0000"/>
      <text x="18" y="67" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#333" font-weight="500">10 种情绪基调 · 12 种标题公式 · 10 种正文结构</text>
      <circle cx="6" cy="90" r="4" fill="#FF0000"/>
      <text x="18" y="95" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#333" font-weight="500">3 种生成模式（模板 / 自由 / 参考图复刻）</text>
      <circle cx="6" cy="118" r="4" fill="#FF0000"/>
      <text x="18" y="123" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#333" font-weight="500">10+ 背景纹理 · 9 种滤镜特效 · 11 种文字装饰</text>
    </g>
  </g>

  <!-- ============ RIGHT SIDE (x=660..1140) ============ -->

  <!-- Output labels (comic-style tilted pills) -->
  <g transform="translate(680, 38)">
    <rect x="0" y="0" width="140" height="30" rx="15" fill="#FF0000" stroke="#000" stroke-width="1.5" transform="rotate(-3)"/>
    <text x="70" y="20" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700" transform="rotate(-3)">封面图提示词</text>

    <rect x="10" y="38" width="140" height="30" rx="15" fill="#FFD700" stroke="#000" stroke-width="1.5" transform="rotate(2)"/>
    <text x="80" y="58" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="12" fill="#000" text-anchor="middle" font-weight="700" transform="rotate(2)">小红书完整文案</text>

    <!-- Connection line -->
    <path d="M75 72 Q140 125 220 92" stroke="#000" stroke-width="2" fill="none" stroke-dasharray="6 3"/>
    <circle cx="220" cy="92" r="5" fill="#FF0000" stroke="#000" stroke-width="1.5"/>
  </g>

  <!-- Phone mockup (comic style) -->
  <g transform="translate(750, 130)">
    <!-- Phone shadow -->
    <rect x="5" y="5" width="190" height="260" rx="16" fill="#000" opacity="0.15"/>
    <!-- Phone body -->
    <rect x="0" y="0" width="190" height="260" rx="16" fill="#1a1a1a" stroke="#000" stroke-width="3"/>
    <!-- Screen -->
    <rect x="8" y="8" width="174" height="234" rx="10" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <!-- Screen content -->
    <g transform="translate(16, 16)">
      <rect x="0" y="0" width="150" height="208" rx="6" fill="#f8f8f2"/>
      <!-- Comic-style screen title -->
      <text x="75" y="28" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic" font-weight="900" fill="#FFD700" stroke="#000" stroke-width="1" paint-order="stroke" text-anchor="middle">今晚的微醺</text>
      <text x="75" y="48" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="500">是这瓶威士忌给的</text>
      <!-- Tags -->
      <rect x="10" y="64" width="48" height="20" rx="10" fill="#FF0000"/>
      <text x="34" y="78" font-family="-apple-system, sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">微醺</text>
      <rect x="64" y="64" width="48" height="20" rx="10" fill="#FFD700" stroke="#000" stroke-width="0.8"/>
      <text x="88" y="78" font-family="-apple-system, sans-serif" font-size="9" fill="#000" text-anchor="middle" font-weight="700">口袋装</text>
      <rect x="118" y="64" width="40" height="20" rx="10" fill="#000"/>
      <text x="138" y="78" font-family="-apple-system, sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">40°</text>
      <!-- Bottle illustration on screen -->
      <path d="M55 155 L55 128 Q55 118 63 118 L87 118 Q95 118 95 128 L95 155 Q112 163 112 182 L112 202 Q112 206 106 206 L44 206 Q38 206 38 202 L38 182 Q38 163 55 155 Z" fill="#1a1a1a" stroke="#FFD700" stroke-width="1.5"/>
      <rect x="58" y="160" width="30" height="34" rx="3" fill="#fff" stroke="#FFD700" stroke-width="0.8"/>
      <text x="73" y="178" font-family="Georgia, serif" font-size="7" font-style="italic" font-weight="700" fill="#FFD700" text-anchor="middle">BORED</text>
      <text x="73" y="188" font-family="-apple-system, sans-serif" font-size="6" fill="#000" text-anchor="middle">WHISKY</text>
    </g>
    <!-- Home button -->
    <rect x="70" y="250" width="50" height="3" rx="1.5" fill="#333"/>
  </g>

  <!-- Bottle silhouette (comic style, far right) -->
  <g transform="translate(980, 60)" opacity="0.85">
    <!-- Glow -->
    <circle cx="90" cy="240" r="180" fill="#FFD700" fill-opacity="0.06"/>
    <!-- Bottle body with comic outline -->
    <path d="M55 60 L55 20 Q55 5 70 5 L110 5 Q125 5 125 20 L125 60 Q165 85 165 170 L165 420 Q165 435 150 435 L30 435 Q15 435 15 420 L15 170 Q15 85 55 60 Z" fill="#1a1a1a" stroke="#FFD700" stroke-width="2" stroke-opacity="0.5"/>
    <!-- Liquid fill -->
    <path d="M22 220 Q22 200 34 200 L146 200 Q158 200 158 220 L158 420 Q158 430 146 430 L34 430 Q22 430 22 420 Z" fill="#FFD700" fill-opacity="0.15" stroke="#FFD700" stroke-width="0.8" stroke-opacity="0.3"/>
    <!-- Label -->
    <rect x="58" y="245" width="64" height="70" rx="4" fill="#0c0c0a" stroke="#FFD700" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="90" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic" font-weight="900" fill="#FFD700" text-anchor="middle" letter-spacing="1.5">BORED</text>
    <text x="90" y="300" font-family="-apple-system, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="500" letter-spacing="1">WHISKY</text>
    <!-- Cap -->
    <rect x="75" y="228" width="30" height="10" rx="3" fill="#FF0000" fill-opacity="0.3" stroke="#FFD700" stroke-width="0.8" stroke-opacity="0.4"/>
    <!-- Reflection highlights -->
    <ellipse cx="50" cy="120" rx="5" ry="18" fill="#FFD700" fill-opacity="0.15"/>
    <ellipse cx="130" cy="220" rx="3" ry="12" fill="#FFD700" fill-opacity="0.12"/>
  </g>

  <!-- Starburst decorations on right side -->
  <g transform="translate(580, 55)">
    <use href="#star-s" x="0" y="0" transform="rotate(15)"/>
  </g>
  <g transform="translate(720, 330)">
    <use href="#star-l" x="0" y="0" transform="rotate(-20)"/>
  </g>
  <g transform="translate(1080, 420)">
    <use href="#star-s" x="0" y="0" transform="rotate(45)"/>
  </g>
  <g transform="translate(620, 520)">
    <use href="#star-s" x="0" y="0" transform="rotate(-10)"/>
  </g>

  <!-- ============ BOTTOM BANNER ============ -->
  <g transform="translate(20, 720)">
    <!-- Yellow banner -->
    <rect x="0" y="0" width="1160" height="80" fill="#FFD700" stroke="#000" stroke-width="3"/>
    <!-- Inner dashed border -->
    <rect x="5" y="5" width="1150" height="70" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="4 4" opacity="0.3"/>

    <!-- Starbursts on banner -->
    <use href="#star-l" x="60" y="40" transform="rotate(-10 60 40)"/>
    <use href="#star-l" x="1100" y="40" transform="rotate(10 1100 40)"/>

    <!-- Brand DNA -->
    <text x="100" y="28" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#000" font-weight="700" letter-spacing="1">品牌 DNA</text>
    <text x="100" y="54" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="16" fill="#000" font-weight="900">BAYC #480 · 数字雅痞 · 社交货币 · 手掌大小 · 口袋装</text>

    <!-- Red dot -->
    <circle cx="85" cy="41" r="4" fill="#FF0000"/>
  </g>

</svg>