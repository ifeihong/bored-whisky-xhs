    <text x="20" y="300" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="17" fill="#333" font-weight="500">年轻人的口袋威士忌 · 专为 BORED WHISKY 打造的小红书爆款内容生成器</text>
    <text x="20" y="326" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="15" fill="#666">适配 GPT Image2 / Seedream5.0 / Nano Banana Pro 等主流 AI 生图模型</text>

