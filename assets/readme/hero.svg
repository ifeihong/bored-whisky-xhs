      <text x="273" y="22" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="14" fill="#000" text-anchor="middle" font-weight="700">T4 搭配</text>
      <rect x="312" y="0" width="78" height="32" rx="16" fill="#FFD700" stroke="#000" stroke-width="1.5"/>
      <text x="351" y="22" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="14" fill="#000" text-anchor="middle" font-weight="700">T5 人物</text>
