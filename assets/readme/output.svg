<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">Output Structure</title>
  <desc id="desc">Each generation produces two parts: image generation prompt and Xiaohongshu full copy</desc>

  <defs>
    <pattern id="dots-op" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="3.5" fill="#000" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background: light blue with dots -->
  <rect width="1200" height="260" fill="#87CEEB"/>
  <rect width="1200" height="260" fill="url(#dots-op)"/>

  <!-- Comic panel frames -->
  <rect x="5" y="5" width="1190" height="250" rx="0" fill="none" stroke="#000" stroke-width="8"/>
  <rect x="9" y="9" width="1182" height="242" rx="0" fill="none" stroke="#fff" stroke-width="3"/>
  <rect x="12" y="12" width="1176" height="236" rx="0" fill="#fff"/>

  <!-- Input section -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="240" height="180" rx="12" fill="#fff" stroke="#000" stroke-width="2.5"/>
    <!-- Header bar -->
    <rect x="0" y="0" width="240" height="38" rx="12" fill="#000"/>
    <rect x="0" y="20" width="240" height="18" fill="#000"/>
    <text x="120" y="25" font-family="-apple-system, sans-serif" font-size="12" fill="#FFD700" text-anchor="middle" font-weight="700" letter-spacing="2">INPUT</text>
    <line x1="0" y1="38" x2="240" y2="38" stroke="#000" stroke-width="1.5"/>
    <!-- Ref 1 -->
    <rect x="20" y="58" width="200" height="38" rx="8" fill="#FFD700" fill-opacity="0.12" stroke="#FFD700" stroke-width="1.2"/>
    <text x="120" y="82" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#000" text-anchor="middle" font-weight="600">参考图 1 · 产品照片</text>
    <!-- Ref 2 -->
    <rect x="20" y="106" width="200" height="38" rx="8" fill="#FFD700" fill-opacity="0.12" stroke="#FFD700" stroke-width="1.2"/>
    <text x="120" y="130" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#000" text-anchor="middle" font-weight="600">参考图 2 · 品牌 LOGO</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(300, 130)" opacity="0.4">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#000" stroke-width="2.5"/>
    <polygon points="50,-6 62,0 50,6" fill="#000"/>
  </g>

  <!-- Output 1: Prompt -->
  <g transform="translate(380, 40)">
    <rect x="0" y="0" width="380" height="180" rx="12" fill="#fff" stroke="#000" stroke-width="2.5"/>
    <rect x="0" y="0" width="380" height="38" rx="12" fill="#FF0000"/>
    <rect x="0" y="20" width="380" height="18" fill="#FF0000"/>
    <text x="190" y="25" font-family="-apple-system, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="700" letter-spacing="1">OUTPUT 1 · 图片生成提示词</text>
    <line x1="0" y1="38" x2="380" y2="38" stroke="#000" stroke-width="1.5"/>
    <text x="24" y="72" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="14" fill="#000" font-weight="600">结构化中文提示词</text>
    <text x="24" y="100" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="14" fill="#333" font-weight="500">3:4 竖版 · 产品角度锁定 · 品牌 LOGO 植入</text>
    <text x="24" y="132" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#666">适配 GPT Image2 / Seedream5.0 / Nano Banana Pro</text>
  </g>

  <!-- Plus sign -->
  <g transform="translate(780, 130)" opacity="0.5">
    <text x="20" y="5" font-family="-apple-system, sans-serif" font-size="20" fill="#000" font-weight="900" text-anchor="middle">+</text>
  </g>

  <!-- Output 2: Copy -->
  <g transform="translate(840, 40)">
    <rect x="0" y="0" width="320" height="180" rx="12" fill="#fff" stroke="#000" stroke-width="2.5"/>
    <rect x="0" y="0" width="320" height="38" rx="12" fill="#000"/>
    <rect x="0" y="20" width="320" height="18" fill="#000"/>
    <text x="160" y="25" font-family="-apple-system, sans-serif" font-size="12" fill="#FFD700" text-anchor="middle" font-weight="700" letter-spacing="1">OUTPUT 2 · 小红书文案</text>
    <line x1="0" y1="38" x2="320" y2="38" stroke="#000" stroke-width="1.5"/>
    <text x="24" y="72" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="14" fill="#000" font-weight="600">吸睛标题（3 候选）</text>
    <text x="24" y="100" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="14" fill="#333" font-weight="500">400-800 字正文 · emoji</text>
    <text x="24" y="128" font-family="-apple-system, BlinkMacSystemFont, PingFang SC, sans-serif" font-size="13" fill="#666">10-15 个话题标签</text>
  </g>
</svg>